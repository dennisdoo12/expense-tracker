<!DOCTYPE html>
<html lang="en">
    <head>
  <meta charset="UTF-8">
  <!--Phone and tablet display-->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Tracker</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body> 
    <h1>Expense Tracker</h1>
    <!-- Users enter the expense information here. Description of product -->
    <form id="expense-form">
      <!--Description box with text-->
        <label for="description">Description</label>
        <input type="text" id="description"> 
      <!-- Amount box with text No negative values and decimal amounts allowed  -->
        <label for="amount">Amount</label>
        <input type="number" id="amount" min="0" step="0.01">

        <!-- Category Label -->
        <label for="category">Category</label>
        <!-- Options for the category dropdown menu  -->
        <select id="category">
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Other">Other</option>
        </select>
        

        <!--Date label and input for expense date.Errors can be shown as well-->
        <label for="date">Date</label>
        <input type="date" id="date">

        <button type="submit">Add Expense</button>
        <p id="error-message"></p>
      </form>
